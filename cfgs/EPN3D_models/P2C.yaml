_base_: cfgs/dataset_configs/EPN3D.yaml

optimizer:
  type: AdamW
  kwargs:
    lr: 0.0001
    weight_decay: 0.0001

scheduler:
  type: LambdaLR
  kwargs:
    decay_step: 20
    lr_decay: 0.9
    lowest_decay: 0.02

bnmscheduler:
  type: Lambda
  kwargs:
    decay_step: 21
    bn_decay: 0.5
    bn_momentum: 0.9
    lowest_decay: 0.01

dataset:
  train:
    NAME: EPN3D
    N_POINTS: 2048
    CATEGORY_FILE_PATH: "data/EPN3D/EPN3D_split.json"

    PARTIAL_POINTS_PATH: "data/EPN3D/%s/partial/%s.npy"
    COMPLETE_POINTS_PATH: "data/EPN3D/%s/complete/%s.npy"
    others:
      subset: train
      class_choice: ['lamp']
      bs: 32

  val:
    NAME: EPN3D
    N_POINTS: 2048
    CATEGORY_FILE_PATH: "data/EPN3D/EPN3D_split.json"

    PARTIAL_POINTS_PATH: "data/EPN3D/%s/partial/%s.npy"
    COMPLETE_POINTS_PATH: "data/EPN3D/%s/complete/%s.npy"
    others:
      subset: val
      class_choice: ['lamp']
      bs: 32

  test:
    NAME: EPN3D
    N_POINTS: 2048
    CATEGORY_FILE_PATH:  "data/EPN3D/EPN3D_split.json"
    PARTIAL_POINTS_PATH: "data/EPN3D/%s/partial/%s.npy"
    COMPLETE_POINTS_PATH: "data/EPN3D/%s/complete/%s.npy"   
    others:
      subset: test
      class_choice: ['lamp']
      bs: 32



model:
  NAME: P2C
  num_group: 64
  group_size: 32
  mask_ratio: [20, 40, 4]
  feat_dim: 1024
  n_points: 2048
  shape_recon_weight: 1
  shape_matching_weight: 1000
  latent_weight: 0.1
  nbr_ratio: 2.0
  support: 16
  neighborhood_size: 32
  manifold_weight: 0.01

total_bs: 32
step_per_update: 1
max_epoch: 300
consider_metric: CDL2
