optimizer: {
  type: AdamW,
  kwargs: {
    lr: 0.0001,
    weight_decay: 0.0001
  }
}

scheduler: {
  type: LambdaLR,
  kwargs: {
    decay_step: 60,
    lr_decay: 0.9,
    lowest_decay: 0.02  # min lr = lowest_decay * lr
  }
}

bnmscheduler: {
  type: Lambda,
  kwargs: {
    decay_step: 21,
    bn_decay: 0.5,
    bn_momentum: 0.9,
    lowest_decay: 0.01
  }
}

dataset: {
  train: {
    NAME: PCNCompleteDataset,
    others: {
      subset: "train",
      categories: ["watercraft"],
      bs: 32,
      CATEGORY_FILE_PATH: "data/PCN/PCN.json",
      N_POINTS: 2048,
      PARTIAL_POINTS_PATH: "data/PCN/train/partial/%s/%s/%02d.npy",
      COMPLETE_POINTS_PATH: "data/PCN/train/complete/%s/%s.npy"
    }
  },
  val: {
    NAME: PCNCompleteDataset,
    others: {
      subset: "test",
      categories: ['watercraft'],
      bs: 32,
      CATEGORY_FILE_PATH: "data/PCN/PCN.json",
      PARTIAL_POINTS_PATH: "data/PCN/test/partial/%s/%s/%02d.npy",  # <-- fix this
      COMPLETE_POINTS_PATH: "data/PCN/test/complete/%s/%s.npy",     # <-- and this
      N_POINTS: 2048
    }
  },  
  test: {
    NAME: PCNCompleteDataset,
    others: {
      subset: "test",
      categories: ["watercraft"],
      bs: 32,
      CATEGORY_FILE_PATH: "data/PCN/PCN.json",
      N_POINTS: 2048,
      PARTIAL_POINTS_PATH: "data/PCN/test/partial/%s/%s/%02d.npy",
      COMPLETE_POINTS_PATH: "data/PCN/test/complete/%s/%s.npy"
    }
  }
}


model: {
  NAME: P2C,
  num_group: 64,
  group_size: 32,
  mask_ratio: [10, 50, 4],
  feat_dim: 1024,
  n_points: 2048,
  shape_recon_weight: 1000,
  shape_matching_weight: 1000,
  latent_weight: 100,
  nbr_ratio: 2.0,
  support: 24,
  neighborhood_size: 32,
  manifold_weight: 0
}

total_bs: 32
step_per_update: 1
max_epoch: 300

consider_metric: CDL2
